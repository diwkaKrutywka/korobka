@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap');
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(105%)}to{transform:translateY(0)}}
@keyframes badgeGlow{0%,100%{box-shadow:-4px 0 14px rgba(11,143,99,.2)}50%{box-shadow:-8px 0 28px rgba(11,143,99,.55)}}
@keyframes badgeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes aura{0%{opacity:0.45;transform:scale(1)}100%{opacity:0;transform:scale(2.4)}}
.fi{animation:fadeIn .3s ease-out both}.pi{animation:popIn .3s cubic-bezier(.16,1,.3,1) both}
.ov{animation:fadeOverlay .2s ease-out both}.su{animation:slideUp .3s cubic-bezier(.16,1,.3,1) both}
.bg{animation:badgeFloat 3s ease-in-out infinite,badgeGlow 2.8s ease-in-out infinite}
.ar{position:absolute;inset:0;border-radius:14px 0 0 14px;background:linear-gradient(135deg,#0B8F63,#10B981);pointer-events:none}
.ar1{animation:aura 2.6s ease-out infinite}.ar2{animation:aura 2.6s ease-out 1.3s infinite}
.kb{transition:transform .1s}.kb:active{transform:scale(.97)!important}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#0B8F6340;border-radius:4px}
`;

const B = ({ children, f, o, s, d, style = {}, ...p }) => {
  const base = { padding: s ? "6px 12px" : "11px 24px", borderRadius: 20, border: "none", fontSize: s ? 11 : 13, fontWeight: 700, cursor: "pointer", fontFamily: font, display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 5, ...style };
  if (d) return <button className="kb" style={{ ...base, background: C.dangerL, color: C.danger, border: `1.5px solid ${C.danger}30` }} {...p}>{children}</button>;
  if (o) return <button className="kb" style={{ ...base, background: "transparent", color: C.pri, border: `1.5px solid ${C.pri}40` }} {...p}>{children}</button>;
  if (f) return <button className="kb" style={{ ...base, background: C.grad, color: "#fff", boxShadow: `0 2px 8px ${C.priGlow}` }} {...p}>{children}</button>;
  return <button className="kb" style={{ ...base, background: C.priL, color: C.pri }} {...p}>{children}</button>;
};

const NP = ({ value, onChange, onSubmit, max = 12 }) => {
  const add = d => value.length < max && onChange(value + d);
  const ready = value.length === max;
  const BsIco = () => (
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
      <path d="M18 9l-6 6M12 9l6 6"/>
    </svg>
  );
  const ChkIco = () => (
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  );
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, width: "100%" }}>
      {["1","2","3","4","5","6","7","8","9","⌫","0","✓"].map(k => (
        <button key={k} className="kb"
          onClick={() => k === "⌫" ? onChange(value.slice(0,-1)) : k === "✓" ? onSubmit?.() : add(k)}
          style={{
            height: 52, borderRadius: 13, border: "none", fontFamily: font,
            background: k === "✓" ? (ready ? C.grad : C.borderL) : C.bg,
            color: k === "✓" ? (ready ? "#fff" : C.txtMuted) : k === "⌫" ? C.txtSec : C.txt,
            fontSize: 19, fontWeight: 700, cursor: "pointer",
            boxShadow: k === "✓" && ready ? `0 4px 12px ${C.priGlow}` : k !== "✓" ? "0 1px 3px rgba(0,0,0,0.05)" : "none",
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "background .15s, box-shadow .15s",
          }}>
          {k === "⌫" ? <BsIco/> : k === "✓" ? <ChkIco/> : k}
        </button>
      ))}
    </div>
  );
};

  const cells = Array(fd).fill(null).concat(Array.from({length: dim}, (_, i) => i+1));
  return (
    <Md onClose={onX}><div style={{ padding: 18 }}>
      <div style={{ textAlign: "center", fontFamily: font }}><div style={{ fontWeight: 800, fontSize: 13, color: C.txt }}>{doc.name}</div><div style={{ fontSize: 10, color: C.txtSec }}>{doc.spec} / Каб.{doc.room}</div></div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 1, fontSize: 10, textAlign: "center" }}>
        {["пн","вт","ср","чт","пт","сб","вс"].map(d => <div key={d} style={{ padding: 2, fontWeight: 700, color: C.txtMuted, fontFamily: font }}>{d}</div>)}

              <div>
                <div style={{ fontWeight: 800, fontSize: 12, color: C.txt, fontFamily: font }}>{h.doctor}</div>
                <div style={{ fontSize: 10, color: C.txtSec }}>{h.spec} · {h.date} в {h.time}</div>
              </div>
              <div style={{ padding: "3px 8px", borderRadius: 7, background: h.status === "done" ? C.successL : C.dangerL, color: h.status === "done" ? C.success : C.danger, fontSize: 9, fontWeight: 700, fontFamily: font }}>{h.status === "done" ? "Завершён" : "Отменён"}</div>
            </div>
          </IC></St>)}
        </div>}
      </Sc>
      {del && <Md onClose={() => setDel(null)}><div style={{ padding: 22, textAlign: "center" }}>
        <div style={{ width: 48, height: 48, borderRadius: "50%", background: C.warnL, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 10px" }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.warn} strokeWidth="1.8" strokeLinecap="round"><path d="M12 9v5M12 17h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        </div>
        <div style={{ fontWeight: 800, fontSize: 14, color: C.txt, fontFamily: font }}>Отменить запись?</div>
        <div style={{ fontSize: 11, color: C.txtSec, marginTop: 4, fontFamily: font }}>Подтверждение придёт на ваш номер</div>
        <div style={{ display: "flex", gap: 7, marginTop: 14 }}>
          <B o onClick={() => setDel(null)} style={{ flex: 1 }}>Нет</B>
          <B d onClick={() => { setApts(a => a.filter(x => x.id !== del)); setDel(null); }} style={{ flex: 1 }}>Отменить</B>
        </div>
      </div></Md>}
      <Bar onBack={fromSuccess ? onBack : () => setStep("hub")} onHome={onHome} lang={lang} onLang={onLang}/>
    </div>
  );
};

/* ═══ ASEL SCREEN (roadmap placeholder) ═══ */
const AselScreen = ({ onBack, onHome, lang, onLang }) => (
  <div style={{ display: "flex", flexDirection: "column", height: "100%", background: C.white, position: "relative" }}>
    <SBar/><MiniAv/>
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28, textAlign: "center" }}>
      <div className="fi" style={{ marginBottom: 8 }}>
        <div style={{ width: 90, height: 90, borderRadius: 28, background: C.priL, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:`0 8px 32px ${C.priGlow}` }}>
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
            <rect x="10" y="15" width="36" height="28" rx="9" fill={C.pri}/>
            <rect x="14" y="19" width="28" height="20" rx="6" fill={C.priL}/>
            <circle cx="22" cy="27" r="3.5" fill={C.pri}/>
            <circle cx="34" cy="27" r="3.5" fill={C.pri}/>
            <circle cx="23" cy="26" r="1.2" fill="#fff"/>
            <circle cx="35" cy="26" r="1.2" fill="#fff"/>
            <path d="M22 34 Q28 38 34 34" stroke={C.pri} strokeWidth="1.6" fill="none" strokeLinecap="round"/>
            <line x1="28" y1="15" x2="28" y2="8" stroke={C.pri} strokeWidth="2" strokeLinecap="round"/>
            <circle cx="28" cy="6.5" r="2.5" fill={C.pri}/>
            <rect x="5" y="21" width="5" height="10" rx="2.5" fill={C.pri} opacity="0.4"/>
            <rect x="46" y="21" width="5" height="10" rx="2.5" fill={C.pri} opacity="0.4"/>
            <rect x="22" y="43" width="12" height="7" rx="3" fill={C.pri} opacity="0.35"/>
          </svg>
        </div>
      </div>
      <div className="fi" style={{ animationDelay: ".1s" }}>
        <div style={{ fontSize: 22, fontWeight: 800, color: C.txt, fontFamily: font }}>Асель</div>
        <div style={{ fontSize: 12, color: C.pri, fontWeight: 700, fontFamily: font, marginTop: 2 }}>ИИ-ассистент терминала</div>
      </div>
      <IC className="fi" style={{ marginTop: 20, textAlign: "left", animationDelay: ".2s" }}>
        <div style={{ fontSize: 11, color: C.txtSec, lineHeight: 1.7, fontFamily: font }}>
          <strong style={{ color: C.txt }}>Голосовой + чатовый ассистент</strong> для навигации по терминалу.<br/>
          Помогает записаться, найти врача, ответить на вопросы о клинике на казахском и русском языках.
        </div>
      </IC>
    </div>
    <Bar onBack={onBack} onHome={onHome} lang={lang} onLang={onLang}/>
  </div>
);

/* ═══ MAIN ═══ */
function App() {
  const [sc, setSc] = useState("welcome");
  const [lang, setLang] = useState("ru");
  const [iin, setIin] = useState("");
  const [dept, setDept] = useState(null);
  const [doc, setDoc] = useState(null);
  const [md, setMd] = useState(null);
  const [ad, setAd] = useState(null);
  const [at, setAt] = useState(null);
  const [ps, setPs] = useState(false);
  const mods = { queue: true, cab: true, asel: true, map: true };
  const [hubTab, setHubTab] = useState("new");

  const home = useCallback(() => { setSc("menu"); setIin(""); setDept(null); setDoc(null); setMd(null); setPs(false); setHubTab("new"); }, []);
  const tl = () => setLang(l => l === "ru" ? "kz" : "ru");

  useEffect(() => {
    if (sc === "welcome" || sc === "lang") return;
    let t; const r = () => { clearTimeout(t); t = setTimeout(() => { setSc("welcome"); setIin(""); setDept(null); setDoc(null); setMd(null); }, 180000); };
    r(); window.addEventListener("click", r); window.addEventListener("touchstart", r);
    return () => { clearTimeout(t); window.removeEventListener("click", r); window.removeEventListener("touchstart", r); };
  }, [sc]);

  const iinOk = (v) => {
    setIin(v);
    setSc(mods.cab ? "apthub" : "depts");
    if (!ps) setTimeout(() => setMd("phone"), 700);
  };

  const R = () => {
    switch (sc) {
      case "welcome": return <Welcome onStart={() => setSc("lang")}/>;
      case "lang": return <LangSel onSel={l => { setLang(l); setSc("menu"); }}/>;
      case "menu": return <Menu onNav={setSc} lang={lang} onLang={tl} mods={mods}/>;
      case "apt": return <IINS title={mods.cab ? "Приём и кабинет" : "Запись на приём"} sub="Введите ИИН" onOk={iinOk} onBack={() => setSc("menu")} onHome={home} lang={lang} onLang={tl}/>;
      case "apthub": return (
        <div style={{ position: "relative", height: "100%" }}>
          <AptHub iin={iin} initialTab={hubTab} onBack={() => { setHubTab("new"); setSc("apt"); }} onHome={home} lang={lang} onLang={tl} onBooking={d => { setDept(d); setSc("docs"); }}/>
          {md === "phone" && <PhoneBadge onClose={() => { setMd(null); setPs(true); }}/>}
        </div>
      );
      case "depts": return (
        <div style={{ position: "relative", height: "100%" }}>
          <Depts iin={iin} onSel={d => { setDept(d); setSc("docs"); }} onBack={() => setSc("apt")} onHome={home} lang={lang} onLang={tl}/>
          {md === "phone" && <PhoneBadge onClose={() => { setMd(null); setPs(true); }}/>}
        </div>
      );
      case "docs": return (
        <div style={{ position: "relative", height: "100%" }}>
          <Docs iin={iin} dept={dept} onSel={d => { setDoc(d); setMd("cal"); }} onBack={() => setSc(mods.cab ? "apthub" : "depts")} onHome={home} lang={lang} onLang={tl}/>
          {md === "cal" && <CalMd doc={doc} onOk={(d,t) => { setAd(d); setAt(t); setMd("conf"); }} onX={() => setMd(null)}/>}
          {md === "conf" && <ConfMd doc={doc} day={ad} time={at} onOk={() => { setMd(null); setSc("succ"); }} onBack={() => setMd("cal")} onX={() => setMd(null)}/>}
        </div>
      );
      case "succ": return <Succ msg="Записан!" onHome={home} onCab={mods.cab ? () => { setHubTab("mine"); setSc("apthub"); } : null}/>;
      case "osms": return <OSMS onBack={() => setSc("menu")} onHome={home} lang={lang} onLang={tl}/>;
      case "info": return <Info onBack={() => setSc("menu")} onHome={home} lang={lang} onLang={tl} mods={mods}/>;
      case "npa": return <Info onBack={() => setSc("menu")} onHome={home} lang={lang} onLang={tl} mods={mods}/>;
      case "queue": return <Queue onBack={() => setSc("menu")} onHome={home} lang={lang} onLang={tl}/>;
      case "asel": return <AselScreen onBack={() => setSc("menu")} onHome={home} lang={lang} onLang={tl}/>;
      default: return <Welcome onStart={() => setSc("lang")}/>;
    }
  };

  return (
    <><style>{css}</style>
    <div style={{ width:"100vw", height:"100vh", overflow:"hidden", background:C.white, fontFamily:font, position:"relative" }}>{R()}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
